<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C1694F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dirt Girls</title>
<link rel="manifest" href="manifest.json">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FDF6EC;
  --terracotta: #C1694F;
  --terracotta-dark: #A3553D;
  --brown: #3E2723;
  --brown-light: #6D4C41;
  --gold: #D4A84B;
  --sage: #8A9A5B;
  --sage-light: #E8EDDB;
  --border: #E0D5C5;
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--cream);
  color: var(--brown);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  text-align: center;
  padding: 16px 16px 8px;
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-size: 0.75rem;
  color: var(--brown-light);
  margin-top: 2px;
}

/* Home Screen */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: calc(100vh - 60px); min-height: calc(100dvh - 60px); }

#home-screen {
  align-items: center;
  padding: 0 20px 24px;
}

.camera-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  width: 100%;
  max-width: 400px;
}

.camera-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--terracotta);
  border: 4px solid var(--terracotta-dark);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(193, 105, 79, 0.35);
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-user-select: none;
  user-select: none;
}
.camera-btn:active {
  transform: scale(0.95);
  box-shadow: 0 2px 8px rgba(193, 105, 79, 0.3);
}
.camera-btn svg { width: 40px; height: 40px; }
.camera-btn span { font-size: 0.8rem; font-weight: 600; }

.gallery-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 28px;
  background: var(--sage-light);
  border: 2px solid var(--sage);
  color: var(--brown);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
}
.gallery-btn:active { opacity: 0.8; }
.gallery-btn svg { width: 20px; height: 20px; }

input[type="file"] { display: none; }

/* Recent observations */
.recent-section {
  width: 100%;
  max-width: 400px;
  margin-top: 20px;
}
.recent-section h2 {
  font-size: 0.85rem;
  color: var(--brown-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.recent-list { display: flex; flex-direction: column; gap: 8px; }

.recent-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: white;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
}
.recent-card:active { background: #f9f4eb; }
.recent-card img {
  width: 52px;
  height: 52px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}
.recent-card .info { flex: 1; min-width: 0; }
.recent-card .info .title {
  font-size: 0.9rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.recent-card .info .meta {
  font-size: 0.75rem;
  color: var(--brown-light);
  margin-top: 2px;
}
.recent-card .category-badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--sage-light);
  color: var(--sage);
  font-weight: 600;
  white-space: nowrap;
}

.empty-state {
  text-align: center;
  padding: 24px;
  color: var(--brown-light);
  font-size: 0.85rem;
  line-height: 1.5;
}

/* Unsorted queue */
.unsorted-section {
  width: 100%;
  max-width: 400px;
  margin-top: 16px;
}
.unsorted-section h2 {
  font-size: 0.85rem;
  color: var(--brown-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.unsorted-section h2 .badge {
  background: var(--terracotta);
  color: white;
  font-size: 0.7rem;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 700;
}
.unsorted-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -20px;
  padding: 0 20px;
  scrollbar-width: none;
}
.unsorted-scroll::-webkit-scrollbar { display: none; }
.unsorted-list {
  display: flex;
  gap: 10px;
  padding-bottom: 4px;
}
.unsorted-thumb {
  flex-shrink: 0;
  width: 80px;
  cursor: pointer;
  position: relative;
}
.unsorted-thumb img {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid var(--border);
  display: block;
}
.unsorted-thumb:active img {
  opacity: 0.8;
}
.unsorted-thumb .thumb-time {
  font-size: 0.65rem;
  color: var(--brown-light);
  text-align: center;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.unsorted-thumb .thumb-delete {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--brown);
  color: var(--cream);
  border: 2px solid var(--cream);
  font-size: 0.7rem;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
  display: none;
}
.unsorted-thumb:active .thumb-delete,
.unsorted-thumb:hover .thumb-delete {
  display: block;
}

/* Annotation Screen */
#annotate-screen { padding: 0 16px 24px; }

.photo-preview {
  width: 100%;
  max-height: 220px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
  background: #eee;
}
.photo-preview img {
  width: 100%;
  height: 100%;
  max-height: 220px;
  object-fit: cover;
  display: block;
}

.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--brown-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

/* Plant chips (horizontal scroll) */
.plant-chips-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -16px;
  padding: 0 16px;
  scrollbar-width: none;
}
.plant-chips-wrap::-webkit-scrollbar { display: none; }
.plant-chips {
  display: flex;
  gap: 8px;
  padding-bottom: 4px;
}
.plant-chip {
  flex-shrink: 0;
  padding: 10px 16px;
  border-radius: 20px;
  border: 2px solid var(--border);
  background: white;
  font-size: 0.85rem;
  color: var(--brown);
  cursor: pointer;
  white-space: nowrap;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.plant-chip:active { opacity: 0.8; }
.plant-chip.selected {
  border-color: var(--sage);
  background: var(--sage-light);
  color: var(--brown);
  font-weight: 600;
}
.plant-chip.add-plant {
  border-style: dashed;
  border-color: var(--sage);
  color: var(--sage);
  font-weight: 600;
}
.plant-chip .sci-name {
  font-size: 0.7rem;
  font-style: italic;
  color: var(--brown-light);
  display: block;
  margin-top: 1px;
}
.plant-chip .fav-star {
  display: inline-block;
  margin-right: 4px;
  font-size: 0.9rem;
  cursor: pointer;
  color: var(--border);
  transition: color 0.15s;
}
.plant-chip .fav-star.active { color: var(--gold); }
.plant-chips-divider {
  flex-shrink: 0;
  width: 2px;
  align-self: stretch;
  background: var(--border);
  margin: 4px 2px;
  border-radius: 1px;
}

/* Category chips */
.category-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.category-chip {
  padding: 10px 16px;
  border-radius: 20px;
  border: 2px solid var(--border);
  background: white;
  font-size: 0.85rem;
  color: var(--brown);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: border-color 0.15s, background 0.15s;
}
.category-chip:active { opacity: 0.8; }
.category-chip.selected {
  border-color: var(--terracotta);
  background: #FDF0EB;
  color: var(--terracotta-dark);
  font-weight: 600;
}
.category-chip .chip-icon { font-size: 1.1rem; }
.category-chip.add-category {
  border-style: dashed;
  border-color: var(--terracotta);
  color: var(--terracotta);
  font-weight: 600;
}
.add-cat-inline {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.add-cat-inline input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 0.9rem;
  color: var(--brown);
  background: white;
  font-family: inherit;
}
.add-cat-inline input:focus { outline: none; border-color: var(--terracotta); }
.add-cat-inline button {
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  background: var(--terracotta);
  color: white;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}
.add-cat-inline .btn-cat-cancel {
  background: none;
  border: 2px solid var(--border);
  color: var(--brown-light);
}

/* Note field */
textarea.note-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1rem;
  color: var(--brown);
  background: white;
  font-family: inherit;
  resize: vertical;
  min-height: 60px;
}
textarea.note-input:focus {
  outline: none;
  border-color: var(--terracotta);
}

/* Connection field (collapsible) */
.connection-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
.connection-toggle .toggle-arrow {
  font-size: 0.75rem;
  transition: transform 0.2s;
  color: var(--brown-light);
}
.connection-toggle.open .toggle-arrow {
  transform: rotate(90deg);
}
.connection-toggle span {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--brown-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.connection-fields {
  display: none;
  background: white;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-top: 4px;
}
.connection-fields.open { display: block; }
.connection-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.connection-row span {
  font-size: 0.85rem;
  color: var(--brown-light);
  flex-shrink: 0;
}
.connection-input {
  flex: 1;
  min-width: 80px;
  padding: 10px 12px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 0.9rem;
  color: var(--brown);
  background: var(--cream);
  font-family: inherit;
}
.connection-input:focus {
  outline: none;
  border-color: var(--terracotta);
}
.connection-rel-chips {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.connection-rel-chip {
  padding: 7px 12px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: var(--cream);
  font-size: 0.8rem;
  color: var(--brown);
  cursor: pointer;
}
.connection-rel-chip.selected {
  border-color: var(--terracotta);
  background: #FDF0EB;
  color: var(--terracotta-dark);
  font-weight: 600;
}
.detail-connection {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.9rem;
  color: var(--brown);
  margin-top: 2px;
}
.detail-connection .conn-arrow {
  color: var(--terracotta);
  font-weight: 600;
  margin: 0 4px;
}

/* Observer toggle */
.observer-toggle {
  display: flex;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: white;
}
.observer-btn {
  flex: 1;
  padding: 14px;
  border: none;
  background: white;
  font-size: 1rem;
  font-weight: 500;
  color: var(--brown-light);
  cursor: pointer;
  text-align: center;
  transition: background 0.15s, color 0.15s;
}
.observer-btn:first-child { border-right: 2px solid var(--border); }
.observer-btn.selected {
  background: var(--terracotta);
  color: white;
  font-weight: 600;
}

/* Action buttons */
.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  padding-bottom: 16px;
}
.btn-save {
  flex: 1;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: var(--terracotta);
  color: white;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(193, 105, 79, 0.3);
}
.btn-save:active { background: var(--terracotta-dark); }
.btn-cancel {
  padding: 16px 20px;
  border-radius: 14px;
  border: 2px solid var(--border);
  background: white;
  color: var(--brown-light);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
}
.btn-cancel:active { background: #f5f0e8; }

/* Detail screen */
#detail-screen { padding: 0 16px 24px; }

.detail-photo {
  width: 100%;
  max-height: 300px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
}
.detail-photo img {
  width: 100%;
  max-height: 300px;
  object-fit: cover;
  display: block;
}
.detail-fields { display: flex; flex-direction: column; gap: 12px; }
.detail-field label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--brown-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.detail-field .value {
  font-size: 1rem;
  margin-top: 2px;
}
.detail-actions {
  margin-top: 20px;
  display: flex;
  gap: 12px;
}
.btn-back {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  border: 2px solid var(--border);
  background: white;
  color: var(--brown);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
}
.btn-delete {
  padding: 14px 20px;
  border-radius: 14px;
  border: 2px solid #e57373;
  background: white;
  color: #c62828;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
}
.btn-delete:active { background: #ffebee; }
.btn-share {
  padding: 14px 20px;
  border-radius: 14px;
  border: 2px solid var(--sage);
  background: var(--sage-light);
  color: var(--brown);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-share:active { opacity: 0.8; }
.btn-share svg { width: 18px; height: 18px; }
.btn-edit-obs {
  padding: 14px 20px;
  border-radius: 14px;
  border: 2px solid var(--sage);
  background: white;
  color: var(--brown);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-edit-obs:active { background: var(--sage-light); }

/* Notes timeline */
.note-timeline { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.note-entry {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
}
.note-entry .note-ts {
  font-size: 0.7rem;
  color: var(--brown-light);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 4px;
}
.note-entry .note-text { font-size: 0.95rem; line-height: 1.5; }
.note-entry .note-edit-btn {
  font-size: 0.75rem;
  color: var(--terracotta);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  margin-top: 4px;
  font-weight: 600;
}
.note-entry textarea {
  width: 100%;
  padding: 10px;
  border: 2px solid var(--terracotta);
  border-radius: 8px;
  font-size: 0.9rem;
  color: var(--brown);
  font-family: inherit;
  resize: vertical;
  min-height: 50px;
  margin-top: 4px;
}
.note-entry .note-edit-actions { display: flex; gap: 8px; margin-top: 6px; }
.note-entry .note-edit-actions button {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.note-entry .note-edit-actions .btn-note-save { background: var(--terracotta); color: white; }
.note-entry .note-edit-actions .btn-note-cancel { background: var(--sage-light); color: var(--brown); }
.btn-add-note {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  border-radius: 10px;
  border: 2px dashed var(--sage);
  background: none;
  color: var(--sage);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
}
.btn-add-note:active { background: var(--sage-light); }
.add-note-area { margin-top: 8px; }
.add-note-area textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid var(--terracotta);
  border-radius: 10px;
  font-size: 0.95rem;
  color: var(--brown);
  font-family: inherit;
  resize: vertical;
  min-height: 60px;
}
.add-note-area .note-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
.add-note-area .note-edit-actions button {
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.add-note-area .note-edit-actions .btn-note-save { background: var(--terracotta); color: white; }
.add-note-area .note-edit-actions .btn-note-cancel { background: var(--sage-light); color: var(--brown); }
.detail-latin { font-size: 0.8rem; font-style: italic; color: var(--brown-light); margin-top: 2px; }
.detail-categories { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.detail-cat-badge {
  font-size: 0.75rem;
  padding: 4px 10px;
  border-radius: 10px;
  background: var(--sage-light);
  color: var(--sage);
  font-weight: 600;
}
.recent-card .info .plant-latin {
  font-size: 0.7rem;
  font-style: italic;
  color: var(--brown-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Export bar on home screen */
.export-bar {
  width: 100%;
  max-width: 400px;
  margin-top: 16px;
  display: flex;
  gap: 10px;
}
.btn-export {
  flex: 1;
  padding: 12px 16px;
  border-radius: 12px;
  border: 2px solid var(--gold);
  background: #FDF6EC;
  color: var(--brown);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-export:active { background: #f5edda; }
.btn-export svg { width: 18px; height: 18px; flex-shrink: 0; }
.btn-export .badge {
  background: var(--terracotta);
  color: white;
  font-size: 0.7rem;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 700;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(62, 39, 35, 0.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open {
  display: flex;
}
.modal-card {
  background: var(--cream);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-card h2 {
  font-size: 1.1rem;
  margin-bottom: 16px;
  color: var(--brown);
}
.modal-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1rem;
  color: var(--brown);
  background: white;
  font-family: inherit;
  margin-bottom: 12px;
}
.modal-input:focus {
  outline: none;
  border-color: var(--terracotta);
}
.modal-input-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--brown-light);

// ── IndexedDB Setup ──
const DB_NAME = 'DirtGirlsDB';
const DB_VERSION = 6;

const NATIVE_STATUS_OPTIONS = [
  { value: 'native-local',      label: 'Native \u2014 Harris County / Gulf Coast', color: 'green' },
  { value: 'native-texas',      label: 'Native \u2014 Texas (outside my region)',  color: 'yellow' },
  { value: 'native-southeast',  label: 'Native \u2014 Southeast US',               color: 'yellow' },
  { value: 'cultivar-native',   label: 'Cultivar of native species',               color: 'yellow' },
  { value: 'nonnative-ok',      label: 'Non-native \u2014 well behaved',           color: 'gray' },
  { value: 'nonnative-invasive', label: 'Non-native \u2014 invasive',              color: 'gray' },
];

const SOURCE_OPTIONS = [
  { value: 'seed-self',       label: 'Started from seed \u2014 self collected' },
  { value: 'seed-purchased',  label: 'Started from seed \u2014 purchased' },
  { value: 'volunteer',       label: 'Volunteer / self-seeded in yard' },

];

function nativeStatusColor(val) {
  const opt = NATIVE_STATUS_OPTIONS.find(o => o.value === val);
  return opt ? opt.color : '';
}
function nativeStatusLabel(val) {
  const opt = NATIVE_STATUS_OPTIONS.find(o => o.value === val);
  return opt ? opt.label : '';
}
function sourceLabel(val) {
  const opt = SOURCE_OPTIONS.find(o => o.value === val);
  return opt ? opt.label : '';
}
function sourceShortLabel(val) {
  if (!val) return '';
  if (val.startsWith('seed')) return 'Seed';
  if (val === 'volunteer') return 'Volunteer';
  if (val.startsWith('division')) return 'Cutting';
  if (val.startsWith('nursery')) return 'Nursery';
  return '';
}

const DEFAULT_PLANTS = [
  { id: 'mother-tree',  name: 'Mother Tree',  sci: 'Cercis canadensis', location: 'front', group: 'tree', nickname: '', favorite: false, nativeStatus: '', source: '', sourceNotes: '', identifiedBy: '' },

// ── Helpers for display ──
function plantLabel(p) { return p.nickname || p.name; }

// Normalize old observations to new format
function normalizeObs(obs) {
  // category: string → array
  if (typeof obs.category === 'string') {
    obs.category = obs.category ? [obs.category] : ['general'];
  }
  // note: string → notes array
  if (!obs.notes) {
    obs.notes = obs.note ? [{ text: obs.note, timestamp: obs.photoTimestamp }] : [];
    delete obs.note;
  }
  return obs;
}

// Custom categories from localStorage
function getCustomCategories() {
  try { return JSON.parse(localStorage.getItem('dg_custom_categories') || '[]'); }
  catch { return []; }
}
function saveCustomCategories(cats) {
  localStorage.setItem('dg_custom_categories', JSON.stringify(cats));
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const tx = e.target.transaction;
      if (!d.objectStoreNames.contains('observations')) {
        const store = d.createObjectStore('observations', { keyPath: 'id' });
        store.createIndex('date', 'date', { unique: false });
      }
      if (!d.objectStoreNames.contains('plants')) {
        const plantStore = d.createObjectStore('plants', { keyPath: 'id' });
        DEFAULT_PLANTS.forEach(p => plantStore.add(p));
      }
      if (!d.objectStoreNames.contains('unsorted')) {
        d.createObjectStore('unsorted', { keyPath: 'id' });
      }
      // v4 migration: add nickname/favorite to existing plants
      if (e.oldVersion < 4 && e.oldVersion >= 1) {
        const plantStore = tx.objectStore('plants');
        const cursorReq = plantStore.openCursor();
        cursorReq.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (cursor) {
            const p = cursor.value;
            let changed = false;
            if (p.nickname === undefined) { p.nickname = ''; changed = true; }
            if (p.favorite === undefined) { p.favorite = false; changed = true; }
            if (changed) cursor.update(p);
            cursor.continue();
          }
        };
      }
      // v5 migration: add nativeStatus/source/sourceNotes to existing plants
      if (e.oldVersion < 5 && e.oldVersion >= 1) {
        const plantStore = tx.objectStore('plants');
        const cursorReq5 = plantStore.openCursor();
        cursorReq5.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (cursor) {
            const p = cursor.value;
            let changed = false;
            if (p.nativeStatus === undefined) { p.nativeStatus = ''; changed = true; }
            if (p.source === undefined) { p.source = ''; changed = true; }
            if (p.sourceNotes === undefined) { p.sourceNotes = ''; changed = true; }
            if (changed) cursor.update(p);
            cursor.continue();
          }
        };
      }
      // v6 migration: add identifiedBy to existing plants
      if (e.oldVersion < 6 && e.oldVersion >= 1) {
        const plantStore = tx.objectStore('plants');
        const cursorReq6 = plantStore.openCursor();
        cursorReq6.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (cursor) {
            const p = cursor.value;
            if (p.identifiedBy === undefined) { p.identifiedBy = ''; cursor.update(p); }
            cursor.continue();
          }
        };
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

// ── Observation CRUD ──

    tx.onerror = (e) => reject(e.target.error);

}

// ── State ──
let currentPhotoBlob = null;
let currentPhotoDataURL = null;
let currentUnsortedId = null;
let selectedPlant = '';
let selectedPlantObj = null;
let selectedCategories = new Set();
let selectedObserver = 'Courtney';
let selectedLocation = '';
let viewingObservationId = null;
let editingObservation = null; // set when editing an existing observation
let allPlantsCache = [];
let navigationOrigin = 'home'; // track where detail screen was opened from
let currentProfilePlant = null;
let pendingPlantGridRefresh = false;
let modalPhotoBlob = null;
let identifiedByINat = false;

// ── DOM Refs ──
const homeScreen = document.getElementById('home-screen');
const annotateScreen = document.getElementById('annotate-screen');

function handlePhoto(file) {
  if (!file) return;
  currentPhotoBlob = file;
  const reader = new FileReader();
  reader.onload = async (e) => {
    currentPhotoDataURL = e.target.result;
    // Save to unsorted queue immediately
    const unsortedItem = {
      id: crypto.randomUUID(),
      photo: currentPhotoDataURL,
      timestamp: new Date().toISOString()
    };
    try {
      await addUnsorted(unsortedItem);
      currentUnsortedId = unsortedItem.id;
    } catch (err) {
      console.error('Failed to save to unsorted:', err);
      currentUnsortedId = null;
    }
    previewImg.src = currentPhotoDataURL;
    resetForm();
    showScreen(annotateScreen);
    renderPlantChips();
  };
  reader.readAsDataURL(file);
}

function openUnsortedItem(item) {
  currentPhotoDataURL = item.photo;
  currentUnsortedId = item.id;
  previewImg.src = item.photo;
  resetForm();
  showScreen(annotateScreen);
  renderPlantChips();
}

async function openEditObservation(obs) {
  editingObservation = obs;
  currentPhotoDataURL = obs.photo;
  currentUnsortedId = null;
  previewImg.src = obs.photo;
  resetForm();

  // Pre-fill plant selection
  await renderPlantChips();
  const plantName = obs.plant || '';
  if (plantName && plantName !== 'Unknown') {
    selectedPlant = plantName;
    selectedPlantObj = allPlantsCache.find(p => plantLabel(p) === plantName) || null;
    // Highlight the matching chip
    plantChips.querySelectorAll('.plant-chip').forEach(chip => {
      if (chip.textContent.trim() === plantName) {
        chip.classList.add('selected');
      }
    });
  }

  // Pre-fill categories
  const cats = Array.isArray(obs.category) ? obs.category : [obs.category || 'general'];
  selectedCategories = new Set(cats);
  renderCategoryChips();

  // Pre-fill note (use first note text if exists)
  const firstNote = (obs.notes && obs.notes.length > 0) ? obs.notes[0].text : '';
  noteInput.value = firstNote;

  // Pre-fill observer
  selectedObserver = obs.observer || 'Courtney';
  document.querySelectorAll('.observer-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.observer === selectedObserver);
  });

  // Pre-fill connection
  if (obs.connection && obs.connection.subject) {
    connectionToggle.classList.add('open');
    connectionFields.classList.add('open');
    connSubject.value = obs.connection.subject || '';
    connTarget.value = obs.connection.target || '';
    selectedRelationship = obs.connection.relationship || '';
    document.querySelectorAll('.connection-rel-chip').forEach(c => {
      c.classList.toggle('selected', c.dataset.rel === selectedRelationship);
    });
  }

  // Update save button text
  saveBtn.textContent = 'Update';
  showScreen(annotateScreen);
}

// ── Plant Chips ──
async function renderPlantChips() {
  const plants = await getAllPlants();
  allPlantsCache = plants;
  // Sort: favorites first, then trees, companions, custom
  const order = { tree: 0, companion: 1 };
  plants.sort((a, b) => {
    if (a.favorite && !b.favorite) return -1;
    if (!a.favorite && b.favorite) return 1;
    return (order[a.group] ?? 2) - (order[b.group] ?? 2);
  });

  const favs = plants.filter(p => p.favorite);
  const nonFavs = plants.filter(p => !p.favorite);

  let html = '';
  favs.forEach(p => { html += buildPlantChipHTML(p); });
  if (favs.length > 0 && nonFavs.length > 0) {
    html += '<div class="plant-chips-divider"></div>';
  }
  nonFavs.forEach(p => { html += buildPlantChipHTML(p); });
  html += '<button class="plant-chip add-plant" id="addPlantChip">+ Add New</button>';
  plantChips.innerHTML = html;

  // Bind selection (click on chip body, not star)
  plantChips.querySelectorAll('.plant-chip:not(.add-plant)').forEach(chip => {
    chip.addEventListener('click', (e) => {
      if (e.target.classList.contains('fav-star')) return;
      plantChips.querySelectorAll('.plant-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedPlant = chip.dataset.name;
      selectedPlantObj = plants.find(p => plantLabel(p) === selectedPlant || p.name === selectedPlant) || null;
    });
  });

  // Bind star toggles
  plantChips.querySelectorAll('.fav-star').forEach(star => {
    star.addEventListener('click', async (e) => {
      e.stopPropagation();
      const plantId = star.dataset.plantid;
      const plant = plants.find(p => p.id === plantId);
      if (!plant) return;
      plant.favorite = !plant.favorite;
      await updatePlant(plant);
      await renderPlantChips();
    });
  });

  // Bind add-plant
  document.getElementById('addPlantChip').addEventListener('click', openAddPlantModal);
}

function buildPlantChipHTML(p) {
  const sel = (selectedPlant === plantLabel(p) || selectedPlant === p.name) ? ' selected' : '';
  const sci = p.sci ? `<span class="sci-name">${esc(p.sci)}</span>` : '';

// ── Plant Photo ID (Pl@ntNet API) ──
// ▼▼▼ Get your free key at https://my.plantnet.org ▼▼▼
const PLANTNET_API_KEY = 'YOUR_API_KEY_HERE';

function resizeImageBlob(file, maxSize) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', 0.85);
    };
    img.src = url;
  });
}

function dataURLtoBlob(dataURL) {
  const parts = dataURL.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const raw = atob(parts[1]);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function identifyPlantFromImage(imageBlob) {
  if (!PLANTNET_API_KEY || PLANTNET_API_KEY === 'YOUR_API_KEY_HERE') {
    throw new Error('Pl@ntNet API key not set. Get a free key at my.plantnet.org');
  }
  const formData = new FormData();
  formData.append('images', imageBlob, 'photo.jpg');
  formData.append('organs', 'auto');
  const resp = await fetch(`https://my-api.plantnet.org/v2/identify/all?api-key=${PLANTNET_API_KEY}&include-related-images=false&nb-results=3&lang=en`, {
    method: 'POST',
    body: formData
  });
  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`Pl@ntNet API returned ${resp.status}: ${errText}`);
  }
  const data = await resp.json();
  const results = data.results || [];
  return results.slice(0, 3).map(r => ({
    commonName: (r.species && r.species.commonNames && r.species.commonNames[0]) || '',
    latinName: (r.species && r.species.scientificNameWithoutAuthor) || '',
    score: Math.round((r.score || 0) * 100)
  }));
}

// Helper: render suggestion cards and bind taps
function renderIdSuggestions(sugBox, suggestions, onSelect) {
  if (suggestions.length === 0) {
    sugBox.innerHTML = '<div class="id-error">No species matches found. Try a clearer photo or type the name manually.</div>';
  } else {
    let html = '';
    suggestions.forEach((s, i) => {
      html += `<div class="id-suggestion-card" data-idx="${i}">
        <div>
          <div class="id-name">${esc(s.commonName || s.latinName)}</div>
          <div class="id-sci">${esc(s.latinName)}</div>
        </div>
        <div class="id-score">${s.score}%</div>
      </div>`;
    });
    html += '<div class="id-dismiss">None of these</div>';
    sugBox.innerHTML = html;

    sugBox.querySelectorAll('.id-suggestion-card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.idx);
        onSelect(suggestions[idx]);
        sugBox.classList.remove('visible');
      });
    });
    sugBox.querySelector('.id-dismiss').addEventListener('click', () => {
      sugBox.classList.remove('visible');
    });
  }
  sugBox.classList.add('visible');
}

// ── Weather Helpers ──
function wmoCodeToCondition(code) {
  if (code === 0) return { text: 'Clear', icon: '\u2600\uFE0F' };
  if (code <= 3) return { text: ['Clear', 'Mainly clear', 'Partly cloudy', 'Overcast'][code], icon: ['\u2600\uFE0F', '\uD83C\uDF24\uFE0F', '\u26C5', '\u2601\uFE0F'][code] };
  if (code <= 49) return { text: 'Fog', icon: '\uD83C\uDF2B\uFE0F' };
  if (code <= 59) return { text: 'Drizzle', icon: '\uD83C\uDF26\uFE0F' };
  if (code <= 69) return { text: 'Rain', icon: '\uD83C\uDF27\uFE0F' };
  if (code <= 79) return { text: 'Snow', icon: '\u2744\uFE0F' };
  if (code <= 84) return { text: 'Rain showers', icon: '\uD83C\uDF27\uFE0F' };
  if (code <= 86) return { text: 'Snow showers', icon: '\uD83C\uDF28\uFE0F' };
  if (code <= 99) return { text: 'Thunderstorm', icon: '\u26C8\uFE0F' };
  return { text: 'Unknown', icon: '\uD83C\uDF24\uFE0F' };
}

function degreesToCompass(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

async function fetchWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Weather API ${resp.status}`);
  const data = await resp.json();
  const c = data.current;
  const cond = wmoCodeToCondition(c.weather_code);
  return {
    temp: Math.round(c.temperature_2m),
    feelsLike: Math.round(c.apparent_temperature),
    humidity: Math.round(c.relative_humidity_2m),
    windSpeed: Math.round(c.wind_speed_10m),
    windDir: degreesToCompass(c.wind_direction_10m),
    precip: c.precipitation,
    condition: cond.text,
    conditionIcon: cond.icon,
    fetchedAt: new Date().toISOString()
  };
}

async function fetchAndAttachWeather(obsId) {
  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000, maximumAge: 300000 });
    });
    const weather = await fetchWeather(pos.coords.latitude, pos.coords.longitude);
    const tx = db.transaction('observations', 'readwrite');
    const store = tx.objectStore('observations');
    const req = store.get(obsId);
    req.onsuccess = () => {
      const obs = req.result;
      if (obs) {
        obs.weather = weather;
        store.put(obs);
      }
    };
  } catch (e) {
    console.log('Weather fetch skipped:', e.message);
  }
}

    const latin = obs.plantSci ? `<div class="plant-latin">${esc(obs.plantSci)}</div>` : '';
    return `<div class="recent-card" data-id="${obs.id}">
      <img src="${obs.photo}" alt="Photo" loading="lazy">
      <div class="info">
        <div class="title">${esc(obs.plant)}</div>
        ${latin}
        <div class="meta">${obs.date} · ${obs.observer}</div>
      </div>
      <div class="category-badge">${esc(catLabel)}</div>
    </div>`;
  }).join('');

  recentList.querySelectorAll('.recent-card').forEach(card => {
    card.addEventListener('click', () => showDetail(card.dataset.id, observations));
  });
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function renderUnsorted() {
  const items = await getAllUnsorted();
  const section = document.getElementById('unsortedSection');

  if (items.length === 0) {

    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

function renderNotesTimeline(obs) {
  const container = document.getElementById('detailNote');
  const notes = obs.notes || [];

  if (notes.length === 0) {
    container.innerHTML = '<div class="note-timeline"><div class="note-entry"><div class="note-text" style="color:var(--brown-light);">No notes</div></div></div>';
    return;
  }

  let html = '<div class="note-timeline">';
  const sorted = notes.map((n, i) => ({...n, _idx: i})).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  sorted.forEach(n => {
    const i = n._idx;
    const ts = new Date(n.timestamp);
    const dateStr = ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      + ' ' + ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    html += `<div class="note-entry" data-idx="${i}">
      <div class="note-ts">${esc(dateStr)}</div>
      <div class="note-text">${esc(n.text)}</div>
      <button class="note-edit-btn" data-idx="${i}">Edit</button>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;

  // Bind edit buttons
  container.querySelectorAll('.note-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => startEditNote(parseInt(btn.dataset.idx)));
  });
}

function startEditNote(idx) {
  const obs = currentDetailObs;
  const entry = document.querySelector(`.note-entry[data-idx="${idx}"]`);
  if (!entry || !obs.notes[idx]) return;
  const text = obs.notes[idx].text;
  entry.querySelector('.note-text').style.display = 'none';
  entry.querySelector('.note-edit-btn').style.display = 'none';
  const ta = document.createElement('textarea');
  ta.value = text;
  const actions = document.createElement('div');
  actions.className = 'note-edit-actions';
  actions.innerHTML = '<button class="btn-note-save">Save</button><button class="btn-note-cancel">Cancel</button>';
  entry.appendChild(ta);
  entry.appendChild(actions);
  ta.focus();
  actions.querySelector('.btn-note-cancel').addEventListener('click', () => {
    ta.remove();
    actions.remove();
    entry.querySelector('.note-text').style.display = '';
    entry.querySelector('.note-edit-btn').style.display = '';
  });
  actions.querySelector('.btn-note-save').addEventListener('click', async () => {
    const newText = ta.value.trim();
    if (!newText) { showToast('Note cannot be empty'); return; }
    obs.notes[idx].text = newText;
    await updateObservation(obs);
    renderNotesTimeline(obs);
    showToast('Note updated');
  });
}

// ── Share / Export ──
function formatObsDate(obs) {
  const d = new Date(obs.photoTimestamp);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function obsToMarkdown(obs) {
  const o = normalizeObs({...obs, notes: obs.notes ? [...obs.notes] : undefined, category: Array.isArray(obs.category) ? [...obs.category] : obs.category});
  const categoryMap = {
    'plant health': 'Plant health', 'insect': 'Insect visitor', 'bird': 'Bird visitor',
    'wildlife': 'Wildlife', 'soil': 'Soil', 'bloom': 'Bloom', 'weather': 'Weather', 'general': 'General'
  };
  const cats = o.category.map(c => categoryMap[c] || c).join(', ');
  let md = `# Field Observation — ${formatObsDate(obs)}\n`;
  md += `**Observer:** ${obs.observer}\n`;
  md += `**Plant:** ${obs.plant}`;
  if (obs.plantSci) md += ` (_${obs.plantSci}_)`;
  md += `\n`;
  md += `**Category:** ${cats}\n\n`;
  if (o.notes && o.notes.length > 0) {
    o.notes.forEach(n => {
      const ts = new Date(n.timestamp);
      const dateStr = ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        + ' ' + ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      md += `**${dateStr}:** ${n.text}\n\n`;
    });
  }
  if (obs.connection && obs.connection.subject) {
    md += `**Connection:** ${obs.connection.subject} \u2192 ${obs.connection.relationship} \u2192 ${obs.connection.target}\n\n`;
  }
  if (obs.weather) {
    const w = obs.weather;
    md += `**Conditions:** ${w.condition}, ${w.temp}\u00B0F (feels ${w.feelsLike}\u00B0F), ${w.humidity}% humidity, wind ${w.windDir} ${w.windSpeed} mph`;
    if (w.precip > 0) md += `, ${w.precip}" precip`;
    md += `\n\n`;
  }
  md += `**Photo:** ${obs.date}_${obs.time.replace(':', '')}\_${obs.plant.replace(/[^a-zA-Z0-9]/g, '')}.jpg\n`;
  return md;
}

function obsFilename(obs) {
  const plant = obs.plant.replace(/[^a-zA-Z0-9]+/g, '_').replace(/(^_|_$)/g, '');
  return `${obs.date}_${obs.time.replace(':', '')}_${plant}.md`;
}

async function dataURLtoBlob(dataURL) {
  const res = await fetch(dataURL);
  return res.blob();
}

async function shareObservation(obs) {
  const md = obsToMarkdown(obs);
  const mdFile = new File([md], obsFilename(obs), { type: 'text/markdown' });
  const files = [mdFile];

  // Also include the photo as a sharable file
  if (obs.photo) {
    try {
      const photoBlob = await dataURLtoBlob(obs.photo);
      const plant = obs.plant.replace(/[^a-zA-Z0-9]+/g, '_').replace(/(^_|_$)/g, '');
      const photoFile = new File([photoBlob], `${obs.date}_${obs.time.replace(':', '')}_${plant}.jpg`, { type: 'image/jpeg' });
      files.push(photoFile);
    } catch (e) { /* photo share failed, still share the md */ }
  }

  if (navigator.canShare && navigator.canShare({ files })) {
    try {
      await navigator.share({ files, title: `Dirt Girls — ${obs.plant}`, text: `Field observation: ${obs.plant}` });
      markExported([obs.id]);
      showToast('Shared!');
    } catch (err) {
      if (err.name !== 'AbortError') showToast('Share cancelled');
    }
  } else {
    // Fallback: download the markdown file
    const url = URL.createObjectURL(mdFile);
    const a = document.createElement('a');
    a.href = url;
    a.download = obsFilename(obs);
    a.click();
    URL.revokeObjectURL(url);
    markExported([obs.id]);
    showToast('File downloaded');
  }
}

async function exportNewObservations() {
  const observations = await getAllObservations();
  const exported = getExportedIds();
  const newObs = observations.filter(o => !exported.has(o.id));

  if (newObs.length === 0) {
    showToast('Nothing new to export');
    return;
  }

  // Build files array: one md + one photo per observation
  const files = [];
  for (const obs of newObs) {
    const normalized = normalizeObs(obs);
    const md = obsToMarkdown(normalized);
    files.push(new File([md], obsFilename(normalized), { type: 'text/markdown' }));
    if (normalized.photo) {
      try {
        const blob = await dataURLtoBlob(obs.photo);
        const plant = obs.plant.replace(/[^a-zA-Z0-9]+/g, '_').replace(/(^_|_$)/g, '');
        files.push(new File([blob], `${obs.date}_${obs.time.replace(':', '')}_${plant}.jpg`, { type: 'image/jpeg' }));
      } catch (e) { /* skip photo */ }
    }
  }

  if (navigator.canShare && navigator.canShare({ files })) {
    try {
      await navigator.share({ files, title: `Dirt Girls — ${newObs.length} observations` });
      markExported(newObs.map(o => o.id));
      updateExportBar();
      showToast(`${newObs.length} observations exported!`);
    } catch (err) {
      if (err.name === 'AbortError') {
        // User cancelled share dialog — do nothing
      } else {
        console.error('Share failed:', err);
        showToast('Share failed — trying download…');
        // Fall through to download fallback
        let combined = '';
        for (const o of newObs) {
          combined += obsToMarkdown(normalizeObs(o)) + '\n---\n\n';
        }
        const file = new File([combined], `dirt-girls-export-${new Date().toISOString().slice(0, 10)}.md`, { type: 'text/markdown' });
        const url = URL.createObjectURL(file);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(url);
        markExported(newObs.map(o => o.id));
        updateExportBar();
        showToast(`${newObs.length} observations downloaded`);
      }
    }
  } else {
    // Fallback: share one at a time won't work well, download a combined file
    let combined = '';
    for (const obs of newObs) {
      combined += obsToMarkdown(normalizeObs(obs)) + '\n---\n\n';
    }
    const file = new File([combined], `dirt-girls-export-${new Date().toISOString().slice(0, 10)}.md`, { type: 'text/markdown' });
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url;
    a.download = file.name;
    a.click();
    URL.revokeObjectURL(url);
    markExported(newObs.map(o => o.id));
    updateExportBar();
    showToast(`${newObs.length} observations downloaded`);
  }
}

// Track which observations have been exported
function getExportedIds() {
  try {
    return new Set(JSON.parse(localStorage.getItem('dg_exported') || '[]'));
  } catch { return new Set(); }
}

function markExported(ids) {
  const exported = getExportedIds();
  ids.forEach(id => exported.add(id));
  localStorage.setItem('dg_exported', JSON.stringify([...exported]));
}

async function updateExportBar() {
  const observations = await getAllObservations();
  const exported = getExportedIds();
  const newCount = observations.filter(o => !exported.has(o.id)).length;
  const bar = document.getElementById('exportBar');
  const badge = document.getElementById('exportCount');
  if (newCount > 0) {
    bar.style.display = 'flex';
    badge.textContent = newCount;
  } else {
    bar.style.display = 'none';
  }
}

// ── Plants Grid ──
async function renderPlantsGrid() {
  const plants = await getAllPlants();
  const observations = await getAllObservations();

  // Build photo map: plantLabel → most recent photo
  const photoMap = {};
  const sorted = observations.sort((a, b) => (b.photoTimestamp || '').localeCompare(a.photoTimestamp || ''));
  for (const obs of sorted) {
    if (obs.photo && obs.plant && !photoMap[obs.plant]) {
      photoMap[obs.plant] = obs.photo;
    }
  }

  // Sort: favorites first, then alphabetical
  plants.sort((a, b) => {
    if (a.favorite !== b.favorite) return b.favorite ? 1 : -1;
    return plantLabel(a).localeCompare(plantLabel(b));
  });

  const grid = document.getElementById('plantsGrid');
  if (plants.length === 0) {
    grid.innerHTML = '<div class="profile-empty">No plants yet. Tap + to add one!</div>';
    return;
  }

  grid.innerHTML = plants.map(p => {
    const label = esc(plantLabel(p));
    const sci = p.sci ? esc(p.sci) : '';
    const photo = photoMap[plantLabel(p)];
    const photoHTML = photo
      ? `<img src="${photo}" alt="${label}">`
      : '<div class="placeholder-icon">🌿</div>';
    const starHTML = p.favorite ? '<div class="card-fav-star">★</div>' : '';
    const nsColor = nativeStatusColor(p.nativeStatus);
    const nsDot = nsColor ? `<span class="native-dot ${nsColor}"></span>` : '';
    const srcShort = sourceShortLabel(p.source);
    const srcBadge = srcShort ? `<span class="source-badge">${esc(srcShort)}</span>` : '';
    const badgesHTML = (nsDot || srcBadge) ? `<div class="card-badges">${nsDot}${srcBadge}</div>` : '';
    return `<div class="plant-card" data-plant-id="${esc(p.id)}">
      <div class="plant-card-photo">${photoHTML}${starHTML}</div>
      <div class="plant-card-info">
        <div class="card-name">${label}</div>
        ${sci ? `<div class="card-sci">${sci}</div>` : ''}
        ${badgesHTML}
      </div>
    </div>`;
  }).join('');

  // Bind card taps
  grid.querySelectorAll('.plant-card').forEach(card => {
    card.addEventListener('click', () => {
      const plantId = card.dataset.plantId;
      const plant = plants.find(p => p.id === plantId);
      if (plant) openPlantProfile(plant);
    });
  });
}

// ── Plant Profile ──
async function openPlantProfile(plant) {
  currentProfilePlant = plant;
  const observations = (await getAllObservations())
    .map(normalizeObs)
    .filter(obs => obs.plant === plantLabel(plant))
    .sort((a, b) => (a.photoTimestamp || '').localeCompare(b.photoTimestamp || ''));

  // Header
  document.getElementById('profileName').textContent = plantLabel(plant);
  document.getElementById('profileFavBtn').textContent = plant.favorite ? '★' : '☆';

  // Hero photo — latest observation
  const heroObs = [...observations].reverse().find(o => o.photo);
  const heroEl = document.getElementById('profileHero');
  heroEl.innerHTML = heroObs
    ? `<img src="${heroObs.photo}" alt="${esc(plantLabel(plant))}">`
    : '<div class="placeholder-icon">🌿</div>';

  // Info
  const displayName = plantLabel(plant);
  document.getElementById('profileDisplayName').textContent = displayName;
  const commonEl = document.getElementById('profileCommon');
  if (plant.nickname && plant.name !== plant.nickname) {
    commonEl.textContent = plant.name;
    commonEl.style.display = '';
  } else {
    commonEl.style.display = 'none';
  }
  document.getElementById('profileSci').textContent = plant.sci || '';
  const metaParts = [];
  if (plant.location) metaParts.push(plant.location.charAt(0).toUpperCase() + plant.location.slice(1) + ' yard');
  if (plant.group) metaParts.push(plant.group);
  document.getElementById('profileMeta').textContent = metaParts.join(' · ');

  // Tags (native status + source)
  const tagsEl = document.getElementById('profileTags');
  let tagsHTML = '';
  if (plant.nativeStatus) {
    const nsColor = nativeStatusColor(plant.nativeStatus);
    const nsLabel = nativeStatusLabel(plant.nativeStatus);
    tagsHTML += `<span class="native-badge ${nsColor}">${esc(nsLabel)}</span>`;
  }
  if (plant.source) {
    tagsHTML += `<span class="source-badge">${esc(sourceLabel(plant.source))}</span>`;
  }
  if (plant.identifiedBy) {
    tagsHTML += `<span class="inat-badge">🔬 Identified by ${esc(plant.identifiedBy)}</span>`;
  }
  tagsEl.innerHTML = tagsHTML;
  const srcNotesEl = document.getElementById('profileSourceNotes');
  srcNotesEl.textContent = plant.sourceNotes || '';
  srcNotesEl.style.display = plant.sourceNotes ? '' : 'none';

  // Stats
  const statsEl = document.getElementById('profileStats');
  const count = observations.length;
  let dateRange = '';
  if (count > 0) {
    const first = observations[0].date;
    const last = observations[observations.length - 1].date;
    dateRange = first === last ? first : `${first} — ${last}`;
  }
  statsEl.innerHTML = `
    <div class="profile-stat"><div class="stat-num">${count}</div><div class="stat-label">Observations</div></div>
    <div class="profile-stat"><div class="stat-num">${dateRange || '—'}</div><div class="stat-label">${count > 0 ? 'Date Range' : 'No Data'}</div></div>
  `;

  // Timeline
  renderPlantTimeline(observations);

  showScreen(plantProfileScreen);
}

function renderPlantTimeline(observations) {
  const el = document.getElementById('profileTimeline');
  if (observations.length === 0) {
    el.innerHTML = '<div class="profile-empty">No observations yet for this plant.</div>';
    return;
  }

  el.innerHTML = observations.map(obs => {
    const date = new Date(obs.photoTimestamp || obs.date);
    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const cats = (obs.category || []).slice(0, 3).map(c => `<span class="obs-cat-badge">${esc(c)}</span>`).join('');
    const notePreview = obs.notes && obs.notes.length > 0 ? esc(obs.notes[0].text) : '';
    const thumbHTML = obs.photo ? `<img src="${obs.photo}" alt="">` : '';
    return `<div class="profile-obs-card" data-obs-id="${esc(obs.id)}">
      <div class="profile-obs-thumb">${thumbHTML}</div>
      <div class="profile-obs-info">
        <div class="obs-date">${esc(dateStr)}</div>
        <div class="obs-cats">${cats}</div>
        ${notePreview ? `<div class="obs-note-preview">${notePreview}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // Bind observation card taps
  el.querySelectorAll('.profile-obs-card').forEach(card => {
    card.addEventListener('click', async () => {
      const obsId = card.dataset.obsId;
      navigationOrigin = 'profile';
      const allObs = await getAllObservations();
      viewingObservationId = obsId;
      const obs = normalizeObs(allObs.find(o => o.id === obsId));
      if (!obs) return;
      currentDetailObs = obs;
      document.getElementById('detailImg').src = obs.photo || '';
      document.getElementById('detailPlant').textContent = obs.plant;
      document.getElementById('detailPlantLatin').textContent = obs.plantSci || '';
      const catHTML = (obs.category || []).map(c => `<span class="detail-cat-badge">${esc(c)}</span>`).join('');
      document.getElementById('detailCategory').innerHTML = catHTML;
      renderNotesTimeline(obs);
      document.getElementById('detailObserver').textContent = obs.observer;
      document.getElementById('detailDate').textContent = formatObsDate(obs);
      const connField = document.getElementById('detailConnectionField');
      if (obs.connection && obs.connection.subject) {
        connField.style.display = '';
        document.getElementById('detailConnection').textContent = `${obs.connection.subject} → ${obs.connection.relationship} → ${obs.connection.target}`;
      } else {
        connField.style.display = 'none';
      }
      showScreen(detailScreen);
    });
  });
}

// Profile favorite toggle
document.getElementById('profileFavBtn').addEventListener('click', async () => {
  if (!currentProfilePlant) return;
  currentProfilePlant.favorite = !currentProfilePlant.favorite;
  await updatePlant(currentProfilePlant);
  document.getElementById('profileFavBtn').textContent = currentProfilePlant.favorite ? '★' : '☆';
});

// Profile edit button
document.getElementById('profileEditBtn').addEventListener('click', () => {
  if (!currentProfilePlant) return;
  openEditPlantModal(currentProfilePlant);
});

// Profile back button
document.getElementById('profileBackBtn').addEventListener('click', () => {
  currentProfilePlant = null;
  showScreen(plantsScreen);
  renderPlantsGrid();
});

// ── Toast ──
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Init ──
(async function init() {
  await openDB();
  renderCategoryChips();
  renderRecent();
  renderUnsorted();
  updateExportBar();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
  }

  // ── Install Prompt ──
  let deferredPrompt = null;
  const installBanner = document.getElementById('installBanner');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Only show if user hasn't dismissed recently
    if (!localStorage.getItem('dg_install_dismissed')) {
      installBanner.classList.add('show');
    }
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    installBanner.classList.remove('show');
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      showToast('Installed!');
    }
    deferredPrompt = null;
  });

  document.getElementById('installDismiss').addEventListener('click', () => {
    installBanner.classList.remove('show');
    localStorage.setItem('dg_install_dismissed', Date.now().toString());
  });

  window.addEventListener('appinstalled', () => {
    installBanner.classList.remove('show');
    deferredPrompt = null;
  });
})();
</script>
